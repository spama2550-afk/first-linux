# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: first-linux
description: Hardened Secureblue KDE image with NVIDIA hybrid graphics for Dell G7.

# Switched to Secureblue KDE Nvidia base for privacy, security, and laptop hybrid drivers
base-image: ghcr.io/secureblue/kde-nvidia
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - micro
        - starship
        - btop
    remove:
      packages:
        # Secureblue uses Trivalent; removing standard Firefox packages to avoid duplicates
        - firefox
        - firefox-langpacks

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          # Keeping default flatpaks clean and minimal
          - org.gnome.Loupe
      - scope: user

  - type: signing

