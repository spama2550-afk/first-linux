# yaml-language-server: $schema=https://blue-build.org
name: first-linux
description: Hardened Secureblue KDE image with NVIDIA hybrid graphics for Dell G7.

# Corrected to use the exact official secureblue release track tag format (v41)
base-image: ghcr.io/secureblue/kde-nvidia
image-version: v41

modules:
  - type: files
    files:
      - source: system
        destination: /
